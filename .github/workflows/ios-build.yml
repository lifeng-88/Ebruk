# Ebruk iOS：模拟器编译检查（无需签名 Secrets）
# 在 push / PR 到 main 时自动运行

name: iOS Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Ebruk/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "Ebruk/**"
      - ".github/workflows/ios-build.yml"

env:
  PROJECT_DIR: Ebruk
  XCODE_PROJECT: Ebruk.xcodeproj
  SCHEME: Ebruk

jobs:
  build:
    name: Simulator Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for simulator
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES
